---
- name: Deploy base system configuration
  ansible.builtin.import_playbook: playbooks/base-os.yml

- name: Provision monitoring infrastructure
  ansible.builtin.import_playbook: playbooks/monitoring.yml

- name: Provision infrastructure services
  ansible.builtin.import_playbook: playbooks/infrastructure.yml

- name: Provision databases
  ansible.builtin.import_playbook: playbooks/databases.yml

- name: Provision applications
  ansible.builtin.import_playbook: playbooks/applications.yml

- name: Provision web services
  ansible.builtin.import_playbook: playbooks/web-services.yml

- name: Provision backups
  ansible.builtin.import_playbook: playbooks/backups.yml

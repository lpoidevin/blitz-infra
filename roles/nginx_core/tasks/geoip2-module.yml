---
- name: Install geoip2 module
  ansible.builtin.apt:
    name: libnginx-mod-http-geoip2
    state: present

- name: Download IPinfo Country database
  ansible.builtin.get_url:
    url: "{{ nginx_core_ipinfo_file_url }}?token={{ nginx_core_ipinfo_token }}"
    dest: /etc/nginx/ipinfo-lite.mmdb
    owner: root
    group: root
    mode: '0644'
  when:
    - nginx_core_ipinfo_token is defined
    - nginx_core_ipinfo_token | length > 0
  notify: Reload nginx

- name: Deploy IPinfo environment credentials
  ansible.builtin.copy:
    dest: /etc/default/ipinfo-update
    owner: root
    group: root
    mode: '0600'
    content: |
      IPINFO_TOKEN="{{ nginx_core_ipinfo_token }}"
  when:
    - nginx_core_geoip2_module
    - nginx_core_ipinfo_token is defined

- name: Deploy IPinfo update service
  ansible.builtin.template:
    src: ipinfo-update.service
    dest: /etc/systemd/system/ipinfo-update.service
    mode: '0644'

- name: Deploy IPinfo update timer
  ansible.builtin.copy:
    src: ipinfo-update.timer
    dest: /etc/systemd/system/ipinfo-update.timer
    mode: '0644'

- name: Enable and start IPinfo update timer
  ansible.builtin.systemd_service:
    name: ipinfo-update.timer
    enabled: true
    state: started
    daemon_reload: true

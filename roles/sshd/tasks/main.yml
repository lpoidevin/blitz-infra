---
- name: Configure global sshd settings
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*{{ item.key }}\b'
    line: "{{ item.key }} {{ item.value }}"
    firstmatch: true
    state: present
    validate: /usr/sbin/sshd -t -f %s
  loop: "{{ sshd_global_config | dict2items }}"
  notify: Restart ssh

- name: Deploy match blocks to drop-in directory
  ansible.builtin.template:
    src: match-blocks.conf.j2
    dest: /etc/ssh/sshd_config.d/99-match-blocks.conf
    owner: root
    group: root
    mode: '0600'
    validate: /usr/sbin/sshd -t -f %s
  when: sshd_match_blocks | length > 0
  notify: Reload ssh

- name: Remove 50-cloud-init.conf
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d/50-cloud-init.conf
    state: absent

- name: Deploy firewall rule
  ansible.builtin.copy:
    content: |
      tcp dport 22 log accept \
      comment "Allow SSH"
    dest: /etc/nftables.d/filter-input-v6/sshd.nft
    mode: '0644'
  notify: Reload nftables

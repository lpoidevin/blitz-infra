# SPDX-License-Identifier: MIT
---
argument_specs:
  main:
    short_description: Deploy Prometheus as a Remote Write Receiver
    options:
      prometheus_listen_address:
        type: str
        default: "[::]:9090"
      prometheus_enable_remote_write:
        type: bool
        default: true
        description: Enable the remote write receiver (Required for Alloy push architecture)

      # Data Retention Policies
      prometheus_retention_time:
        type: str
        default: "4w"
        description: How long to keep metrics (e.g., 15d, 1y)
      prometheus_retention_size:
        type: str
        default: "0"
        description: Maximum size of the database (e.g., 50GB). 0 disables it.

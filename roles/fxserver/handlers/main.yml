---
- name: Reload daemon and restart fxserver
  ansible.builtin.systemd_service:
    name: fxserver.service
    state: restarted
    daemon_reload: true

- name: Restart fxserver
  ansible.builtin.systemd_service:
    name: fxserver.service
    state: restarted

- name: Reload alloy
  ansible.builtin.uri:
    url: "http://[::1]:12345/-/reload"
    method: POST
    status_code: 200

- name: Reload nftables
  ansible.builtin.systemd_service:
    name: nftables.service
    state: reloaded

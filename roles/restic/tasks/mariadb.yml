---
- name: Install mariadb-backup
  ansible.builtin.apt:
    name: mariadb-backup
    state: present

- name: Create restic mysqld database user
  ansible.mysql.mysql_user:
    name: "{{ restic_user }}"
    host: localhost
    plugin: unix_socket
    priv: "*.*:RELOAD, PROCESS, LOCK TABLES, BINLOG MONITOR"
    state: present

- name: Create restic system user
  ansible.builtin.user:
    name: "{{ restic_user }}"
    groups: mysql
    append: true

---
- name: Install nginx bouncer
  ansible.builtin.apt:
    name: crowdsec-nginx-bouncer
    state: present

- name: Configure nginx bouncer API URL
  ansible.builtin.lineinfile:
    path: /etc/crowdsec/bouncers/crowdsec-nginx-bouncer.conf
    regexp: '^API_URL='
    line: "API_URL={{ crowdsec_lapi_url }}/"
    mode: '0600'

- name: Set nginx bouncer API key placeholder
  ansible.builtin.lineinfile:
    path: /etc/crowdsec/bouncers/crowdsec-nginx-bouncer.conf
    regexp: '^API_KEY='
    line: 'API_KEY=""  # Will be set during registration'
    mode: '0600'
  when: not crowdsec_lapi_server

- name: Check existing nginx bouncer API key
  ansible.builtin.shell:
    cmd: cscli bouncers list -o json | jq -r '.[] | select(.name=="crowdsec-nginx-bouncer-{{ inventory_hostname_short }}") | .api_key' || echo ""
  register: crowdsec_nginx_key_check
  changed_when: false
  delegate_to: "{{ crowdsec_lapi_server_host | default('localhost') }}"
  when: not crowdsec_lapi_server

- name: Create nginx bouncer API key if not exists
  ansible.builtin.command:
    cmd: cscli bouncers add crowdsec-nginx-bouncer-{{ inventory_hostname_short }} -o raw
  register: crowdsec_nginx_api_key
  changed_when: crowdsec_nginx_api_key.rc == 0
  delegate_to: "{{ crowdsec_lapi_server_host | default('localhost') }}"
  when:
    - not crowdsec_lapi_server
    - crowdsec_nginx_key_check.stdout | length == 0

- name: Retrieve existing nginx bouncer API key
  ansible.builtin.command:
    cmd: cscli bouncers list -o json | jq -r '.[] | select(.name=="crowdsec-nginx-bouncer-{{ inventory_hostname_short }}") | .api_key'
  register: crowdsec_nginx_api_key
  changed_when: false
  delegate_to: "{{ crowdsec_lapi_server_host | default('localhost') }}"
  when:
    - not crowdsec_lapi_server
    - crowdsec_nginx_key_check.stdout | length > 0

- name: Configure nginx bouncer API key
  ansible.builtin.lineinfile:
    path: /etc/crowdsec/bouncers/crowdsec-nginx-bouncer.conf
    regexp: '^API_KEY='
    line: 'API_KEY={{ crowdsec_nginx_api_key.stdout }}'
    mode: '0600'
  notify: reload nginx
  when: not crowdsec_lapi_server

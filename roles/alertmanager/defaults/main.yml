---
alertmanager_listen_address: "[::]:9093"

alertmanager_config:
  global:
    resolve_timeout: 5m

  route:
    group_by: ['alertname', 'cluster', 'service']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    receiver: 'blackhole'

  receivers:
    - name: 'blackhole'

